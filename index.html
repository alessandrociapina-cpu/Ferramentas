<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Analisador de Metadados Ultra</title>
    <script src="https://cdn.jsdelivr.net/npm/exifreader@4.12.0/dist/exif-reader.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 30px; background: #f0f2f5; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #1877f2; border-bottom: 2px solid #e4e6eb; padding-bottom: 10px; }
        input[type="file"] { width: 100%; padding: 20px; border: 2px dashed #1877f2; border-radius: 8px; cursor: pointer; background: #f7f8fa; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; color: #65676b; text-align: left; padding: 12px; width: 35%; border-bottom: 1px solid #e4e6eb; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #e4e6eb; color: #050505; font-size: 14px; word-break: break-all; }
        .gps-row { background-color: #e7f3ff; font-weight: bold; }
        .gps-link { display: inline-block; background: #42b72a; color: white; padding: 8px 15px; border-radius: 6px; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Extração de Metadados (GPS Corrigido)</h2>
    <input type="file" id="fileInput" accept="image/*,video/*">
    <table id="resultTable" style="display:none;">
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const table = document.getElementById('resultTable');
    const tbody = document.getElementById('tableBody');

    // Função para converter coordenadas EXIF para Decimal Real
    function toDecimal(number) {
        if (!number) return null;
        // Se já for um número simples (decimal), retorna ele
        if (typeof number === 'number') return number;
        // Se for a estrutura interna da biblioteca [graus, minutos, segundos]
        if (Array.isArray(number) && number.length === 3) {
            return number[0] + (number[1] / 60) + (number[2] / 3600);
        }
        return parseFloat(number);
    }

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        tbody.innerHTML = '';
        
        try {
            addTableRow("Arquivo", file.name);

            if (file.type.startsWith('image/')) {
                const tags = await ExifReader.load(file);
                
                // Tenta pegar os valores decimais calculados pela biblioteca ou faz manualmente
                let lat = tags.GPSLatitude ? toDecimal(tags.GPSLatitude.value) : null;
                let lon = tags.GPSLongitude ? toDecimal(tags.GPSLongitude.value) : null;

                // Ajusta o sinal (Sul e Oeste devem ser negativos)
                if (tags.GPSLatitudeRef && tags.GPSLatitudeRef.value[0] === 'S') lat = -lat;
                if (tags.GPSLongitudeRef && tags.GPSLongitudeRef.value[0] === 'W') lon = -lon;

                if (lat !== null && lon !== null && lat !== 0) {
                    const url = `https://www.google.com/maps?q=${lat},${lon}`;
                    addTableRow("📍 Localização", `<a href="${url}" target="_blank" class="gps-link">VER LOCAL NO GOOGLE MAPS</a>`, true, "gps-row");
                    addTableRow("Latitude", lat.toFixed(6), false, "gps-row");
                    addTableRow("Longitude", lon.toFixed(6), false, "gps-row");
                } else {
                    addTableRow("GPS", "Coordenadas não encontradas ou zeradas no arquivo.");
                }

                if (tags.Make) addTableRow("Fabricante", tags.Make.description);
                if (tags.Model) addTableRow("Aparelho", tags.Model.description);
                if (tags.DateTime) addTableRow("Data/Hora", tags.DateTime.description);
                
                const width = tags['Image Width']?.value || tags.ImageWidth?.value;
                const height = tags['Image Height']?.value || tags.ImageHeight?.value;
                if (width) addTableRow("Resolução", `${width} x ${height} px`);

            } else if (file.type.startsWith('video/')) {
                const video = await getVideoData(file);
                addTableRow("Duração", video.duration + " seg");
            }

            table.style.display = 'table';
        } catch (err) {
            alert("Erro: " + err.message);
        }
    });

    function addTableRow(label, value, isHTML = false, className = "") {
        const row = tbody.insertRow();
        if (className) row.className = className;
        const th = document.createElement('th');
        th.textContent = label;
        const td = row.insertCell();
        isHTML ? td.innerHTML = value : td.textContent = value;
        row.appendChild(th);
        row.appendChild(td);
    }

    function getVideoData(file) {
        return new Promise((resolve) => {
            const v = document.createElement('video');
            v.preload = 'metadata';
            v.src = URL.createObjectURL(file);
            v.onloadedmetadata = () => {
                URL.revokeObjectURL(v.src);
                resolve({ duration: v.duration.toFixed(1) });
            };
        });
    }
</script>
</body>
</html>
