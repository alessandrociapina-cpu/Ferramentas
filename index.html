<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Analisador de Metadados Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/exifreader@4.12.0/dist/exif-reader.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        input[type="file"] { width: 100%; padding: 20px; border: 2px dashed #1877f2; border-radius: 8px; cursor: pointer; background: #f7f8fa; margin-bottom: 20px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; color: #65676b; text-align: left; padding: 12px; width: 35%; border-bottom: 1px solid #e4e6eb; }
        td { padding: 12px; border-bottom: 1px solid #e4e6eb; color: #050505; }
        .gps-row { background-color: #e7f3ff; font-weight: bold; }
        .gps-link { background: #42b72a; color: white; padding: 8px 15px; border-radius: 6px; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <h2>Analisador de Metadados</h2>
    <input type="file" id="fileInput" accept="image/*,video/*">
    <table id="resultTable" style="display:none;">
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const table = document.getElementById('resultTable');
    const tbody = document.getElementById('tableBody');

    // Função específica para extrair decimal direto do ExifReader
    function getGPS(tag) {
        if (!tag) return null;
        // Tenta pegar o valor já calculado pela biblioteca (muitas vezes disponível)
        if (typeof tag.value === 'number') return tag.value;
        // Se for um array de objetos (Racional), calcula manualmente
        if (Array.isArray(tag.value) && tag.value[0]?.numerator) {
            const d = tag.value[0].numerator / tag.value[0].denominator;
            const m = tag.value[1].numerator / tag.value[1].denominator;
            const s = tag.value[2].numerator / tag.value[2].denominator;
            return d + (m / 60) + (s / 3600);
        }
        return null;
    }

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        tbody.innerHTML = '';

        try {
            addTableRow("Arquivo", file.name);

            if (file.type.startsWith('image/')) {
                const tags = await ExifReader.load(file);
                
                // Extração robusta de coordenadas
                let lat = getGPS(tags.GPSLatitude);
                let lon = getGPS(tags.GPSLongitude);

                // Aplicar direção (S e W tornam o número negativo)
                if (lat && tags.GPSLatitudeRef?.value[0] === 'S') lat = -lat;
                if (lon && tags.GPSLongitudeRef?.value[0] === 'W') lon = -lon;

                // Verificação: se for 0.000, provavelmente é lixo de processamento
                if (lat && lon && Math.abs(lat) > 0.0001) {
                    const url = `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;
                    addTableRow("📍 Localização", `<a href="${url}" target="_blank" class="gps-link">ABRIR GOOGLE MAPS</a>`, true, "gps-row");
                    addTableRow("Latitude", lat.toFixed(6), false, "gps-row");
                    addTableRow("Longitude", lon.toFixed(6), false, "gps-row");
                } else {
                    addTableRow("📍 Localização", "GPS não encontrado (Verifique se a localização estava ativa ao tirar a foto)");
                }

                if (tags.Make) addTableRow("Marca", tags.Make.description);
                if (tags.Model) addTableRow("Modelo", tags.Model.description);
                if (tags.DateTime) addTableRow("Data/Hora", tags.DateTime.description);
                
                const w = tags['Image Width']?.value || tags.ImageWidth?.value;
                const h = tags['Image Height']?.value || tags.ImageHeight?.value;
                if (w) addTableRow("Resolução", `${w} x ${h} px`);

            } else {
                addTableRow("Tipo", "Vídeo selecionado (Metadados básicos apenas)");
            }
            table.style.display = 'table';
        } catch (err) {
            alert("Erro: " + err.message);
        }
    });

    function addTableRow(label, value, isHTML = false, className = "") {
        const row = tbody.insertRow();
        if (className) row.className = className;
        row.innerHTML = `<th>${label}</th><td>${isHTML ? value : value}</td>`;
        if (!isHTML) row.cells[1].textContent = value;
    }
</script>
</body>
</html>
