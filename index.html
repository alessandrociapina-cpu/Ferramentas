<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Analisador de Metadados Pro - v3</title>
    <script src="https://cdn.jsdelivr.net/npm/exifreader@4.12.0/dist/exif-reader.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 30px; background: #f4f7f6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        input[type="file"] { width: 100%; padding: 15px; border: 2px dashed #bdc3c7; border-radius: 5px; margin-bottom: 20px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; display: none; }
        th { background: #f8f9fa; color: #7f8c8d; text-align: left; padding: 12px; width: 30%; border-bottom: 1px solid #eee; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #eee; color: #2c3e50; font-size: 14px; word-break: break-all; }
        .gps-badge { background: #27ae60; color: white; padding: 4px 10px; border-radius: 4px; text-decoration: none; font-weight: bold; font-size: 12px; }
        .error-msg { color: #e74c3c; background: #fdeaea; padding: 10px; border-radius: 5px; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Leitor de Metadados Amigável</h2>
    <input type="file" id="fileInput" accept="image/*,video/*">
    <div id="errorMessage" class="error-msg"></div>
    
    <table id="resultTable">
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const table = document.getElementById('resultTable');
    const tbody = document.getElementById('tableBody');
    const errorDiv = document.getElementById('errorMessage');

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Reset inicial
        tbody.innerHTML = '';
        table.style.display = 'none';
        errorDiv.style.display = 'none';

        try {
            // Informações do Sistema de Arquivos
            addTableRow("Nome", file.name);
            addTableRow("Tamanho", (file.size / (1024 * 1024)).toFixed(2) + " MB");
            addTableRow("Tipo", file.type);

            if (file.type.startsWith('image/')) {
                // Carregar metadados da imagem
                const tags = await ExifReader.load(file);
                
                // Processar GPS com segurança
                if (tags.GPSLatitude && tags.GPSLongitude) {
                    const lat = tags.GPSLatitude.description;
                    const lon = tags.GPSLongitude.description;
                    
                    if (lat && lon) {
                        const mapsLink = `https://www.google.com/maps?q=${lat},${lon}`;
                        addTableRow("📍 Localização", `<a href="${mapsLink}" target="_blank" class="gps-badge">ABRIR NO GOOGLE MAPS</a>`, true);
                        addTableRow("Coordenadas", `${lat} (Lat), ${lon} (Lon)`);
                    }
                }

                // Dados do Equipamento
                if (tags.Make) addTableRow("Fabricante", tags.Make.description);
                if (tags.Model) addTableRow("Modelo", tags.Model.description);
                if (tags.DateTime) addTableRow("Data da Foto", tags.DateTime.description);
                if (tags.Software) addTableRow("Software", tags.Software.description);
                
                // Resolução
                const w = tags['Image Width']?.value || tags.ImageWidth?.value;
                const h = tags['Image Height']?.value || tags.ImageHeight?.value;
                if (w && h) addTableRow("Dimensões", `${w} x ${h} pixels`);

            } else if (file.type.startsWith('video/')) {
                const video = await getVideoData(file);
                addTableRow("Duração", video.duration + " seg");
                addTableRow("Resolução", `${video.width}x${video.height}`);
            }

            table.style.display = 'table';

        } catch (err) {
            console.error("Erro completo:", err);
            errorDiv.textContent = "Não foi possível ler os metadados deste arquivo. Ele pode estar protegido ou não possuir informações EXIF.";
            errorDiv.style.display = 'block';
            table.style.display = 'table'; // Mostra pelo menos os dados do arquivo
        }
    });

    function addTableRow(label, value, isHTML = false) {
        const row = tbody.insertRow();
        const th = document.createElement('th');
        th.textContent = label;
        const td = row.insertCell();
        if (isHTML) td.innerHTML = value;
        else td.textContent = value;
        row.appendChild(th);
        row.appendChild(td);
    }

    function getVideoData(file) {
        return new Promise((resolve) => {
            const v = document.createElement('video');
            v.preload = 'metadata';
            v.src = URL.createObjectURL(file);
            v.onloadedmetadata = () => {
                URL.revokeObjectURL(v.src);
                resolve({ duration: v.duration.toFixed(1), width: v.videoWidth, height: v.videoHeight });
            };
            v.onerror = () => resolve({ duration: "N/A", width: "N/A", height: "N/A" });
        });
    }
</script>

</body>
</html>
