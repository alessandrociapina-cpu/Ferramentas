<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Raio-X de Metadados</title>
    <script src="https://cdn.jsdelivr.net/npm/exifreader@4.12.0/dist/exif-reader.js"></script>
    <style>
        body { font-family: monospace; background: #0d1117; color: #58a6ff; padding: 30px; line-height: 1.5; }
        h2 { color: #fff; }
        p { color: #8b949e; }
        input { margin-bottom: 20px; color: white; padding: 10px; border: 1px solid #30363d; background: #21262d; cursor: pointer; }
        table { border-collapse: collapse; width: 100%; max-width: 900px; background: #161b22; }
        th, td { border: 1px solid #30363d; padding: 10px; text-align: left; }
        th { background: #21262d; color: #c9d1d9; }
        td { color: #a5d6ff; word-break: break-all; }
        .alert { color: #ff7b72; font-weight: bold; background: #490202; text-align: center; padding: 15px; }
        .success { color: #3fb950; font-weight: bold; }
    </style>
</head>
<body>
    <h2>🔍 RAIO-X BRUTO DO ARQUIVO</h2>
    <p>Este código apenas joga na tela tudo o que está gravado dentro do .jpg. Sem filtros.</p>
    
    <input type="file" id="fileInput">
    
    <table>
        <thead>
            <tr>
                <th style="width: 30%;">Nome da Tag Interna</th>
                <th>Valor Encontrado no Arquivo</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <script>
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = '<tr><td colspan="2" style="color:#8b949e;">Vasculhando os bytes do arquivo...</td></tr>';
            
            try {
                const tags = await ExifReader.load(file);
                tbody.innerHTML = '';
                let encontrouGPS = false;
                
                // Varre TODAS as tags que existem no arquivo
                for (const [nomeTag, dados] of Object.entries(tags)) {
                    if (nomeTag.toLowerCase().includes('gps')) encontrouGPS = true;
                    
                    // Oculta blocos gigantes de dados da Samsung para o navegador não travar
                    if (nomeTag === 'MakerNote' || nomeTag === 'thumbnail') continue;
                    
                    const tr = document.createElement('tr');
                    const valor = dados.description || dados.value || 'Vazio';
                    
                    // Destaca o GPS em verde se achar
                    if (nomeTag.toLowerCase().includes('gps')) {
                        tr.innerHTML = `<td class="success">🎯 ${nomeTag}</td><td class="success">${valor}</td>`;
                    } else {
                        tr.innerHTML = `<td>${nomeTag}</td><td>${valor}</td>`;
                    }
                    tbody.appendChild(tr);
                }

                if (!encontrouGPS) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td colspan="2" class="alert">
                    ❌ LAUDO: Nenhuma tag de GPS existe dentro deste arquivo.<br>
                    O seu celular ou navegador apagou a localização por segurança ao carregar a foto.
                    </td>`;
                    tbody.appendChild(tr);
                }
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="2" class="alert">Erro ao ler arquivo: ${err.message}</td></tr>`;
            }
        });
    </script>
</body>
</html>
