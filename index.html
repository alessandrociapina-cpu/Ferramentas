<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Analisador de Metadados Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/exifr/dist/full.umd.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; background: #f0f2f5; color: #1c1e21; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #1877f2; border-bottom: 2px solid #e4e6eb; padding-bottom: 10px; margin-top: 0; }
        /* Botão sem o 'accept' para forçar o Gerenciador de Arquivos do Android */
        input[type="file"] { width: 100%; padding: 20px; border: 2px dashed #1877f2; border-radius: 8px; cursor: pointer; background: #f7f8fa; margin-bottom: 20px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; color: #65676b; text-align: left; padding: 14px; width: 35%; border-bottom: 1px solid #e4e6eb; font-size: 14px; }
        td { padding: 14px; border-bottom: 1px solid #e4e6eb; font-size: 14px; word-break: break-all; }
        .gps-row { background-color: #e7f3ff; font-weight: bold; }
        .gps-link { background: #42b72a; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; display: inline-block; font-size: 13px;}
        .gps-link:hover { background: #36a420; }
        .dica { font-size: 13px; color: #e67e22; background: #fdf2e9; padding: 10px; border-radius: 6px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Leitor de Metadados Profissional</h2>
    
    <div class="dica">
        <strong>💡 Dica:</strong> Para ver o GPS, navegue até a pasta original da foto (ex: Arquivos &gt; DCIM &gt; Câmera) em vez de usar atalhos da Galeria.
    </div>

    <input type="file" id="fileInput">
    
    <table id="resultTable" style="display:none;">
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const table = document.getElementById('resultTable');
    const tbody = document.getElementById('tableBody');

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        tbody.innerHTML = '';
        table.style.display = 'none';

        try {
            addTableRow("Arquivo", file.name);
            addTableRow("Tamanho", (file.size / (1024 * 1024)).toFixed(2) + " MB");

            // Usa a biblioteca EXIFR para ler os dados de forma fácil
            const tags = await exifr.parse(file);
            
            if (tags) {
                // GPS Direto
                if (tags.latitude && tags.longitude) {
                    const lat = tags.latitude;
                    const lon = tags.longitude;
                    const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;
                    
                    addTableRow("📍 Localização", `<a href="${mapsUrl}" target="_blank" class="gps-link">ABRIR NO GOOGLE MAPS</a>`, true, "gps-row");
                    addTableRow("Latitude", lat.toFixed(6), false, "gps-row");
                    addTableRow("Longitude", lon.toFixed(6), false, "gps-row");
                } else {
                    addTableRow("📍 Localização", "GPS removido ou inexistente neste arquivo.");
                }

                if (tags.Make) addTableRow("Marca", tags.Make);
                if (tags.Model) addTableRow("Modelo", tags.Model);
                
                if (tags.DateTimeOriginal) {
                    addTableRow("Data/Hora", new Date(tags.DateTimeOriginal).toLocaleString());
                }

                const width = tags.ExifImageWidth || tags.ImageWidth;
                const height = tags.ExifImageHeight || tags.ImageHeight;
                if (width && height) addTableRow("Resolução", `${width} x ${height} px`);
            } else if (file.type && file.type.startsWith('video/')) {
                // Leitura básica para vídeos
                const video = document.createElement('video');
                video.preload = 'metadata';
                video.src = URL.createObjectURL(file);
                video.onloadedmetadata = () => {
                    URL.revokeObjectURL(video.src);
                    addTableRow("Duração", video.duration.toFixed(2) + " seg");
                    addTableRow("Resolução", `${video.videoWidth} x ${video.videoHeight} px`);
                    table.style.display = 'table';
                };
                return;
            } else {
                addTableRow("Aviso", "Sem metadados EXIF lidos.");
            }

            table.style.display = 'table';

        } catch (err) {
            alert("Erro ao processar: " + err.message);
        }
    });

    function addTableRow(label, value, isHTML = false, className = "") {
        const row = tbody.insertRow();
        if (className) row.className = className;
        row.innerHTML = `<th>${label}</th><td>${isHTML ? value : value}</td>`;
        if (!isHTML) row.cells[1].textContent = value;
    }
</script>
</body>
</html>
