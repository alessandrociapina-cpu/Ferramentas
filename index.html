<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Analisador de Metadados Final</title>
    <script src="https://cdn.jsdelivr.net/npm/exifreader@4.12.0/dist/exif-reader.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 30px; background: #f0f2f5; color: #1c1e21; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #1877f2; border-bottom: 2px solid #e4e6eb; padding-bottom: 15px; margin-top: 0; }
        input[type="file"] { width: 100%; padding: 25px; border: 2px dashed #1877f2; border-radius: 8px; cursor: pointer; background: #f7f8fa; margin-bottom: 20px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; color: #65676b; text-align: left; padding: 14px; width: 35%; border-bottom: 1px solid #e4e6eb; font-size: 14px; }
        td { padding: 14px; border-bottom: 1px solid #e4e6eb; color: #050505; font-size: 14px; word-break: break-all; }
        .gps-row { background-color: #e7f3ff; font-weight: bold; }
        .gps-link { display: inline-block; background: #42b72a; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 13px; }
        .gps-link:hover { background: #36a420; }
    </style>
</head>
<body>

<div class="container">
    <h2>Analisador de Arquivos</h2>
    <p>Selecione uma imagem ou vídeo para extrair metadados.</p>
    <input type="file" id="fileInput" accept="image/*,video/*">
    
    <table id="resultTable" style="display:none;">
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const table = document.getElementById('resultTable');
    const tbody = document.getElementById('tableBody');

    // Função de conversão ultra-segura para números
    function parseGPS(coord) {
        if (!coord) return null;
        let value = coord.description || coord.value || coord;
        
        // Se for o formato de array [graus, minutos, segundos]
        if (Array.isArray(value)) {
            return parseFloat(value[0]) + (parseFloat(value[1] || 0) / 60) + (parseFloat(value[2] || 0) / 3600);
        }
        
        const num = parseFloat(value);
        return isNaN(num) ? null : num;
    }

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        tbody.innerHTML = '';
        table.style.display = 'none';
        
        try {
            addTableRow("Arquivo", file.name);
            addTableRow("Tamanho", (file.size / (1024 * 1024)).toFixed(2) + " MB");

            if (file.type.startsWith('image/')) {
                const tags = await ExifReader.load(file);
                
                let lat = parseGPS(tags.GPSLatitude);
                let lon = parseGPS(tags.GPSLongitude);

                // Correção de Hemisfério (S e W são negativos)
                if (lat && tags.GPSLatitudeRef?.value?.[0] === 'S') lat = -Math.abs(lat);
                if (lon && tags.GPSLongitudeRef?.value?.[0] === 'W') lon = -Math.abs(lon);

                if (lat !== null && lon !== null) {
                    const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${lat},${lon}`;
                    addTableRow("📍 Localização", `<a href="${googleMapsUrl}" target="_blank" class="gps-link">VER NO GOOGLE MAPS</a>`, true, "gps-row");
                    addTableRow("Latitude", lat.toFixed(6), false, "gps-row");
                    addTableRow("Longitude", lon.toFixed(6), false, "gps-row");
                } else {
                    addTableRow("📍 Localização", "GPS não encontrado ou sem permissão.");
                }

                if (tags.Make) addTableRow("Marca", tags.Make.description);
                if (tags.Model) addTableRow("Modelo", tags.Model.description);
                if (tags.DateTime) addTableRow("Data/Hora", tags.DateTime.description);
                
                const w = tags['Image Width']?.value || tags.ImageWidth?.value;
                const h = tags['Image Height']?.value || tags.ImageHeight?.value;
                if (w) addTableRow("Resolução", `${w} x ${h} px`);

            } else if (file.type.startsWith('video/')) {
                const video = await getVideoData(file);
                addTableRow("Duração", video.duration + " seg");
                addTableRow("Resolução", `${video.w}x${video.h}`);
            }

            table.style.display = 'table';
        } catch (err) {
            console.error(err);
            alert("Erro ao ler o arquivo: " + err.message);
        }
    });

    function addTableRow(label, value, isHTML = false, className = "") {
        const row = tbody.insertRow();
        if (className) row.className = className;
        const th = document.createElement('th');
        th.textContent = label;
        const td = row.insertCell();
        if (isHTML) td.innerHTML = value;
        else td.textContent = value;
        row.appendChild(th);
        row.appendChild(td);
    }

    function getVideoData(file) {
        return new Promise((resolve) => {
            const v = document.createElement('video');
            v.preload = 'metadata';
            v.src = URL.createObjectURL(file);
            v.onloadedmetadata = () => {
                URL.revokeObjectURL(v.src);
                resolve({ duration: v.duration.toFixed(1), w: v.videoWidth, h: v.videoHeight });
            };
        });
    }
</script>
</body>
</html>
