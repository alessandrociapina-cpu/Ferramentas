<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Analisador de Metadados Pro - v2</title>
    <script src="https://cdn.jsdelivr.net/npm/exifreader@4.12.0/dist/exif-reader.js"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; padding: 40px; background: #f0f2f5; color: #1c1e21; }
        .container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        h2 { color: #1877f2; margin-top: 0; border-bottom: 2px solid #e4e6eb; padding-bottom: 15px; }
        input[type="file"] { margin: 20px 0; padding: 20px; border: 2px dashed #1877f2; width: 100%; border-radius: 8px; cursor: pointer; background: #f7f8fa; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; display: none; }
        th, td { text-align: left; padding: 14px; border-bottom: 1px solid #e4e6eb; }
        th { background-color: #f0f2f5; color: #4b4b4b; width: 35%; font-weight: 600; }
        tr:hover { background-color: #f9fafb; }
        .gps-link { display: inline-block; background: #42b72a; color: white; padding: 5px 12px; border-radius: 6px; text-decoration: none; font-size: 0.9em; }
        .gps-link:hover { background: #36a420; }
        .no-gps { color: #8e8e8e; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h2>Explorador de Metadados</h2>
    <p>Arraste um arquivo ou clique abaixo para analisar.</p>
    
    <input type="file" id="fileInput" accept="image/*,video/*">
    
    <table id="metadataTable">
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const table = document.getElementById('metadataTable');
    const tbody = document.getElementById('tableBody');

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        tbody.innerHTML = ''; 
        
        // 1. Info Básica
        addRow("Arquivo", file.name);
        addRow("Tamanho", (file.size / (1024 * 1024)).toFixed(2) + " MB");

        try {
            if (file.type.startsWith('image/')) {
                const tags = await ExifReader.load(file);
                
                // 2. Processamento de GPS (Tratando o erro de NaN)
                if (tags.GPSLatitude && tags.GPSLongitude) {
                    // O ExifReader pode retornar o valor decimal direto em .description ou .value
                    const lat = tags.GPSLatitude.description;
                    const lon = tags.GPSLongitude.description;

                    // Validar se os valores são números válidos
                    if (!isNaN(parseFloat(lat)) && !isNaN(parseFloat(lon))) {
                        const googleMapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;
                        addRow("📍 Localização", `<a href="${googleMapsUrl}" target="_blank" class="gps-link">Abrir no Google Maps</a>`, true);
                        addRow("Coordenadas", `${lat}, ${lon}`);
                    } else {
                        addRow("📍 Localização", "<span class='no-gps'>Dados de GPS corrompidos ou em formato inválido</span>", true);
                    }
                } else {
                    addRow("📍 Localização", "<span class='no-gps'>Não disponível neste arquivo</span>", true);
                }

                // 3. Info da Câmera
                if (tags.Make) addRow("Marca", tags.Make.description);
                if (tags.Model) addRow("Câmera/Celular", tags.Model.description);
                if (tags.DateTime) addRow("Data/Hora Original", tags.DateTime.description);
                if (tags.Software) addRow("Editado com", tags.Software.description);
                if (tags.ImageWidth) addRow("Dimensões", `${tags.ImageWidth.value} x ${tags.ImageHeight.value} px`);

            } else if (file.type.startsWith('video/')) {
                const video = await getVideoInfo(file);
                addRow("Duração", video.duration + " segundos");
                addRow("Resolução", `${video.w}x${video.h}`);
            }

            table.style.display = 'table';
        } catch (err) {
            console.error(err);
            alert("Erro ao ler o arquivo. Certifique-se de que é uma imagem ou vídeo válido.");
        }
    });

    function addRow(label, value, isHTML = false) {
        const row = tbody.insertRow();
        row.innerHTML = `<th>${label}</th><td>${isHTML ? value : value}</td>`;
        if (!isHTML) row.cells[1].textContent = value; 
    }

    function getVideoInfo(file) {
        return new Promise((resolve) => {
            const v = document.createElement('video');
            v.preload = 'metadata';
            v.src = URL.createObjectURL(file);
            v.onloadedmetadata = () => {
                URL.revokeObjectURL(v.src);
                resolve({ duration: v.duration.toFixed(2), w: v.videoWidth, h: v.videoHeight });
            };
        });
    }
</script>

</body>
</html>
