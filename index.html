<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Analisador de Metadados Pro - v4</title>
    <script src="https://cdn.jsdelivr.net/npm/exifreader@4.12.0/dist/exif-reader.js"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; padding: 30px; background: #f0f2f5; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #1877f2; border-bottom: 2px solid #e4e6eb; padding-bottom: 10px; }
        input[type="file"] { width: 100%; padding: 20px; border: 2px dashed #1877f2; border-radius: 8px; cursor: pointer; background: #f7f8fa; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; color: #65676b; text-align: left; padding: 12px; width: 35%; border-bottom: 1px solid #e4e6eb; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #e4e6eb; color: #050505; font-size: 14px; word-break: break-all; }
        .gps-row { background-color: #e7f3ff; }
        .gps-link { display: inline-block; background: #42b72a; color: white; padding: 6px 12px; border-radius: 6px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Extração de Metadados</h2>
    <input type="file" id="fileInput" accept="image/*,video/*">
    
    <table id="resultTable" style="display:none;">
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const table = document.getElementById('resultTable');
    const tbody = document.getElementById('tableBody');

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        tbody.innerHTML = '';
        
        try {
            // Dados básicos do arquivo
            addTableRow("Nome do Arquivo", file.name);
            addTableRow("Tamanho", (file.size / (1024 * 1024)).toFixed(2) + " MB");

            if (file.type.startsWith('image/')) {
                const tags = await ExifReader.load(file);
                console.log("Tags encontradas:", tags); // Para debug no console (F12)

                // Lógica de GPS Reforçada
                let lat = tags.GPSLatitude ? tags.GPSLatitude.description : null;
                let lon = tags.GPSLongitude ? tags.GPSLongitude.description : null;

                // Se a descrição falhar, tenta o valor numérico direto
                if (!lat && tags.GPSLatitude) lat = tags.GPSLatitude.value;
                if (!lon && tags.GPSLongitude) lon = tags.GPSLongitude.value;

                if (lat && lon) {
                    const url = `https://www.google.com/maps?q=${lat},${lon}`;
                    addTableRow("📍 Localização", `<a href="${url}" target="_blank" class="gps-link">VER NO MAPA (Google Maps)</a>`, true, "gps-row");
                    addTableRow("Latitude", lat, false, "gps-row");
                    addTableRow("Longitude", lon, false, "gps-row");
                } else {
                    addTableRow("GPS", "Nenhuma coordenada encontrada nesta imagem.");
                }

                // Informações da Câmera
                if (tags.Make) addTableRow("Fabricante", tags.Make.description);
                if (tags.Model) addTableRow("Aparelho", tags.Model.description);
                if (tags.DateTime) addTableRow("Data/Hora", tags.DateTime.description);
                if (tags.Software) addTableRow("Editado com", tags.Software.description);
                
                // Dimensões
                const width = tags['Image Width']?.value || tags.ImageWidth?.value;
                const height = tags['Image Height']?.value || tags.ImageHeight?.value;
                if (width) addTableRow("Resolução", `${width} x ${height} pixels`);

            } else if (file.type.startsWith('video/')) {
                const video = await getVideoData(file);
                addTableRow("Duração", video.duration + " seg");
                addTableRow("Dimensões Vídeo", `${video.width}x${video.height}`);
            }

            table.style.display = 'table';

        } catch (err) {
            alert("Erro ao processar arquivo: " + err.message);
        }
    });

    function addTableRow(label, value, isHTML = false, className = "") {
        const row = tbody.insertRow();
        if (className) row.className = className;
        const th = document.createElement('th');
        th.textContent = label;
        const td = row.insertCell();
        if (isHTML) td.innerHTML = value;
        else td.textContent = value;
        row.appendChild(th);
        row.appendChild(td);
    }

    function getVideoData(file) {
        return new Promise((resolve) => {
            const v = document.createElement('video');
            v.preload = 'metadata';
            v.src = URL.createObjectURL(file);
            v.onloadedmetadata = () => {
                URL.revokeObjectURL(v.src);
                resolve({ duration: v.duration.toFixed(1), width: v.videoWidth, height: v.videoHeight });
            };
        });
    }
</script>

</body>
</html>
