<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Analisador de Metadados Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/exifreader@4.12.0/dist/exif-reader.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background: #eceff1; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        input[type="file"] { margin: 20px 0; padding: 10px; border: 2px dashed #3498db; width: 100%; box-sizing: border-box; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; display: none; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; color: #2c3e50; width: 30%; }
        tr:hover { background-color: #f1f1f1; }
        .gps-link { color: #e74c3c; font-weight: bold; text-decoration: none; }
        .gps-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2>Analisador de Arquivos</h2>
    <p>Selecione uma imagem original (não enviada pelo Zap) para ver o GPS e detalhes técnicos.</p>
    
    <input type="file" id="fileInput" accept="image/*,video/*">
    
    <table id="metadataTable">
        <thead>
            <tr>
                <th>Campo</th>
                <th>Valor</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const table = document.getElementById('metadataTable');
    const tbody = document.getElementById('tableBody');

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        tbody.innerHTML = ''; // Limpa tabela
        let dataRows = [];

        // Informações Básicas
        addRow("Nome do Arquivo", file.name);
        addRow("Tamanho", (file.size / (1024 * 1024)).toFixed(2) + " MB");
        addRow("Tipo", file.type);

        try {
            if (file.type.startsWith('image/')) {
                const tags = await ExifReader.load(file);
                
                // Extração de GPS
                if (tags.GPSLatitude && tags.GPSLongitude) {
                    const lat = tags.GPSLatitude.description;
                    const lon = tags.GPSLongitude.description;
                    const googleMapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;
                    addRow("📍 Localização (GPS)", `<a href="${googleMapsUrl}" target="_blank" class="gps-link">Ver no Google Maps (${lat}, ${lon})</a>`, true);
                } else {
                    addRow("📍 Localização", "Não encontrada (Metadados de GPS ausentes)");
                }

                // Detalhes da Câmera
                if (tags.Make) addRow("Fabricante", tags.Make.description);
                if (tags.Model) addRow("Modelo do Aparelho", tags.Model.description);
                if (tags.DateTime) addRow("Data da Captura", tags.DateTime.description);
                if (tags.Software) addRow("Software/Edição", tags.Software.description);

            } else if (file.type.startsWith('video/')) {
                const video = await getVideoInfo(file);
                addRow("Duração", video.duration + " segundos");
                addRow("Resolução", `${video.w}x${video.h}`);
            }

            table.style.display = 'table';
        } catch (err) {
            alert("Erro ao processar: " + err.message);
        }
    });

    function addRow(label, value, isHTML = false) {
        const row = tbody.insertRow();
        const cell1 = row.insertCell(0);
        const cell2 = row.insertCell(1);
        cell1.innerHTML = `<strong>${label}</strong>`;
        if (isHTML) cell2.innerHTML = value;
        else cell2.textContent = value;
    }

    function getVideoInfo(file) {
        return new Promise((resolve) => {
            const v = document.createElement('video');
            v.preload = 'metadata';
            v.src = URL.createObjectURL(file);
            v.onloadedmetadata = () => {
                URL.revokeObjectURL(v.src);
                resolve({ duration: v.duration.toFixed(2), w: v.videoWidth, h: v.videoHeight });
            };
        });
    }
</script>

</body>
</html>
